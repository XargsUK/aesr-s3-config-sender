<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AESR Config Sender</title>
    <link href="css/options.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">AESR Config Sender</a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Profiles
              </a>
              <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                <li>
                  <div class="dropdown-item">
                    <label for="profileList" class="form-label">Choose a Profile:</label>
                    <select id="profileList" class="form-select">
                    </select>
                  </div>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" id="saveProfileButton">Save Profile</a></li>
                <li><a class="dropdown-item" href="#" id="deleteProfileButton">Delete Profile</a></li>
                <li><a class="dropdown-item" href="#" id="setDefaultProfileButton">Set Default Profile</a></li>
                <li><a class="dropdown-item" href="#" id="importProfileButton">Import Profile</a></li>
                <li><a class="dropdown-item" href="#" id="exportProfileButton">Export Profile</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      <ul class="nav nav-tabs" id="mainTab" role="tablist">
        <li class="nav-item" role="presentation">
          <a class="nav-link active" id="actions-tab" data-bs-toggle="tab" href="#actions" role="tab">Actions</a>
        </li>
        <li class="nav-item" role="presentation">
          <a class="nav-link" id="config-tab" data-bs-toggle="tab" href="#config" role="tab">AESR Config</a>
        </li>
        <li class="nav-item" role="presentation">
          <a class="nav-link" id="s3config-tab" data-bs-toggle="tab" href="#s3config" role="tab">S3 Config</a>
        </li>
        <li class="nav-item" role="presentation">
          <a class="nav-link" id="credentials-tab" data-bs-toggle="tab" href="#credentials" role="tab">Credentials</a>
        </li>
        <li class="nav-item" role="presentation">
          <a class="nav-link" id="cognitoSignIn-tab" data-bs-toggle="tab" href="#cognitoSignIn" role="tab">Cognito</a>
        </li>
      </ul>
      <div class="tab-content mt-3" id="mainTabContent">
        <div class="tab-pane fade show active" id="actions" role="tabpanel" aria-labelledby="actions-tab">
          <button id="cognitoSignInButton" class="btn btn-primary">
            <i class="fa-solid fa-key" style="color: #ffffff;"></i> Cognito Sign-In
          </button>
          <button id="pullS3ConfigButton" class="btn btn-secondary">
            <i class="fa-solid fa-download" style="color: #ffffff;"></i> Pull from S3
          </button>
          <button id="saveButton" class="btn btn-success">
            <i class="fa-solid fa-download" style="color: #ffffff;"></i> Push to AESR
          </button>
          <p id="lastSent" class="mt-2">Last sent: Never</p>
        </div>
        <div class="tab-pane fade" id="config" role="tabpanel" aria-labelledby="config-tab">
          <form>
            <div class="form-group">
              <label for="awsConfigTextArea">Configuration:</label>
              <textarea id="awsConfigTextArea" class="form-control" rows="5"></textarea>
            </div>
            <div class="form-group mt-2">
              <label for="aesrIdText">AESR Extension ID:</label>
              <input id="aesrIdText" class="form-control" type="text">
              <p id="extensionId">Sender Extension ID: </p>
            </div>
          </form>
        </div>
        <div class="tab-pane fade" id="s3config" role="tabpanel" aria-labelledby="s3config-tab">
          <form>
            <div class="form-group">
              <label for="profileName">Profile Name:</label>
              <input id="profileName" class="form-control" type="text">
            </div>
            <div class="form-group mt-2">
              <label for="awsRegion">Region:</label>
              <input id="awsRegion" class="form-control" type="text">
            </div>
            <div class="form-group mt-2">
              <label for="bucketName">Bucket Name:</label>
              <input id="bucketName" class="form-control" type="text">
            </div>
            <div class="form-group mt-2">
              <label for="fileKey">File Key:</label>
              <input id="fileKey" class="form-control" type="text">
            </div>
          </form>
        </div>
        <div class="tab-pane fade" id="credentials" role="tabpanel" aria-labelledby="credentials-tab">
          <form>
            <div class="form-group">
              <label for="awsAccessKey">Access Key:</label>
              <input id="awsAccessKey" class="form-control" type="text">
            </div>
            <div class="form-group mt-2">
              <label for="awsSecretKey">Secret Key:</label>
              <input id="awsSecretKey
              " class="form-control" type="text">
              </div>
              <div class="form-group mt-2">
              <label for="awsSessionToken">Cognito Session Token:</label>
              <input id="awsSessionToken" class="form-control" type="text">
              </div>
              </form>
              </div>
              <div class="tab-pane fade" id="cognitoSignIn" role="tabpanel" aria-labelledby="cognitoSignIn-tab">
              <form>
              <div class="form-group">
              <label for="cognitoUsername">Username:</label>
              <input id="cognitoUsername" class="form-control" type="text">
              </div>
              <div class="form-group mt-2">
              <label for="cognitoPassword">Password:</label>
              <input id="cognitoPassword" class="form-control" type="password">
              </div>
              <div class="form-group mt-2">
              <label for="cognitoUserPoolId">User Pool ID:</label>
              <input id="cognitoUserPoolId" class="form-control" type="text">
              </div>
              <div class="form-group mt-2">
              <label for="cognitoClientAppId">Cognito User Pool Client App ID:</label>
              <input id="cognitoClientAppId" class="form-control" type="text">
              </div>
              <div class="form-group mt-2">
              <label for="cognitoIdentityPoolId">Cognito Identity Pool ID:</label>
              <input id="cognitoIdentityPoolId" class="form-control" type="text">
              </div>
              <div class="form-group mt-2">
              <label for="cognitoRegion">Cognito Region:</label>
              <input id="cognitoRegion" class="form-control" type="text">
              </div>
              </form>
              </div>
              </div>
              </div>
              <script src="js/options.bundle.js"></script>
              
                </body>
              </html>
