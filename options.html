<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title style="text-align: center;">AESR Config Sender</title>
    <link href="css/options.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet" />

    <style>
      md-filled-text-field {
        width: 100%; /* This makes the text field take the full width of its container */
        resize: vertical; /* Allows vertical resizing */
      }
      body {
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: var(--md-sys-typescale-body-medium-font-family-name), sans-serif;
        margin: 0;
        padding: 20px;
      }

      md-filled-button md-icon {
        font-size: 24px; 
        vertical-align: middle; 
      }
      md-filled-tonal-button md-icon {
        font-size: 24px; 
        vertical-align: middle; 
      }
      #tabContent {
        background-color: var(--md-sys-color-surface-container);
        color: var(--md-sys-color-on-surface-container);
        font-family: var(--md-sys-typescale-body-medium-font-family-name), sans-serif;
        padding: 20px;
      }

      #headingOne {
        text-align: center;
        color: var(--md-sys-color-on-surface);
        font-family: var(--md-sys-typescale-body-medium-font-family-name), sans-serif;
        font-size: 2rem; /* Example size, adjust as needed */
        font-weight: bold; /* Makes the text bold */
        margin-bottom: 1rem; /* Adds space below the heading */
      }

      #profileSelectorContainer {
        margin-bottom: 16px; /* Adjust as needed for visual separation */
      }

      #tabsContainer {
        /* Keeps the content inside the tabs aligned with the profile selector */
        background-color: var(--md-sys-color-surface-container);
        padding-top: 20px;
      }

      #profileList {
        background-color: var(--md-sys-color-surface-variant);
        color: var(--md-sys-color-on-surface-variant);
        border: 1px solid var(--md-sys-color-outline);
        border-radius: 4px; /* Rounds the corners */
        padding: 8px; /* Adds some padding inside the dropdown */
        width: auto; /* Sets the width to auto to fit the content */
        display: block; /* Makes the dropdown a block element */
        margin-bottom: 1rem; /* Adds space below the dropdown */
      }

      md-filled-tonal-button, md-filled-button {
        display: flex; /* Use flexbox for alignment */
        align-items: center; /* Centers items vertically */
        justify-content: center; /* Centers items horizontally */
      }

      #buttonContainer {
        display: flex;
        justify-content: start; /* Aligns the buttons to the start of the container */
        gap: 8px; /* Sets a gap between the buttons */
        padding: 0; /* Adjust padding as needed */
      }

      .md-button {
        /* Your existing button styles */
        flex: 1 1 auto; /* Allows the buttons to grow and shrink as needed */
        min-width: 120px; /* Minimum width for the buttons to maintain usability */
        max-width: 200px; /* Maximum width for aesthetic consistency */
      }

      .profile-section {
        display: flex;
        flex-direction: column;
        gap: 10px; /* Adjust the gap size as needed */
        margin-bottom: 20px; /* Provides spacing from the next section */
      }

      /* Button container for Save/Delete/Default */
      .profile-action-buttons {
        display: flex;
        justify-content: start;
        gap: 8px; /* Adjust the gap size as needed */
      }

      .global-settings {
        margin-top: 20px; /* Provides spacing from the profile sections */
      }

      .icon-container {
        display: flex;
        justify-content: flex-end;
        gap: 10px; /* Adjust the gap size as needed */
        padding-right: 20px; /* Aligns with the overall padding of the tab */
      }


    </style>
  </head>
  <body>
    <h1 id="headingOne">AESR Config Sender</h1>

    <!-- Profile Selector Placement -->
    <div id="profileSelectorContainer" style="padding: 0 20px;">
      <md-outlined-select id="profileList"
        class="md-sys-color-surface-variant md-sys-color-on-surface-variant">
        <md-select-option aria-label="blank"></md-select-option>
      </md-outlined-select>
    </div>
    <md-tabs id="myTabs">
      <md-primary-tab>Sync</md-primary-tab>
      <md-primary-tab>Settings</md-primary-tab>
      <md-primary-tab>Help</md-primary-tab>
    </md-tabs>

    <!-- Tabs and Content -->
    <div id="tabsContainer" style="padding: 0 20px;">
      <div id="tabContent">
        <div id="syncContent">
          <br />
          <br />

          <md-filled-text-field
            id="awsConfigTextArea"
            type="textarea"
            label="Configuration from S3"
            rows="5">
          </md-filled-text-field>

          <md-filled-text-field label="AESR Extension ID" type="text"
            id="aesrIdText">
          </md-filled-text-field>
          <p id="extensionId">Sender Extension ID:</p>

          <div id="buttonContainer">
            <md-filled-button class="md-button md-button-download"
              id="pullS3ConfigButton">
              <md-icon>cloud_download</md-icon>
              Download Config
            </md-filled-button>
            <md-filled-tonal-button class="md-button md-button-send"
              id="saveButton">
              <md-icon>send</md-icon>
              Send to AESR
            </md-filled-tonal-button>
          </div>
          <br />

          <p id="lastSent">Last sent: Never</p>

        </div>

        <div id="settingsContent" hidden>

          <div class="profile-section">
            <md-filled-text-field label="Profile Name" type="text"
              id="profileName">
            </md-filled-text-field>
            <md-filled-text-field label="Region" type="text" id="awsRegion">
            </md-filled-text-field>
            <md-filled-text-field label="Bucket Name" type="text"
              id="bucketName">
            </md-filled-text-field>
            <md-filled-text-field label="File Key" type="text" id="fileKey">
            </md-filled-text-field>
          </div>

          <div class="profile-action-buttons">
            <md-filled-button id="saveProfileButton">
              <md-icon>save</md-icon>
              Save
            </md-filled-button>
            <md-filled-button id="deleteProfileButton">
              <md-icon>delete</md-icon>
              Delete
            </md-filled-button>
            <md-filled-button id="setDefaultProfileButton">
              <md-icon>home</md-icon>
              Default
            </md-filled-button>
          </div>

          <div class="global-settings">
            <label>
              <md-checkbox id="debugModeCheckbox" touch-target="wrapper"></md-checkbox>
              Debug Mode
            </label>            
          </div>

          <div class="icon-container">
            <md-icon-button id="importProfileButton" style="float: right;">
              <md-icon>upload</md-icon>
            </md-icon-button>
            <md-icon-button id="exportProfileButton" style="float: right;">
              <md-icon>download</md-icon>
            </md-icon-button>
          </div>

        </div>

        <div id="helpContent" hidden>

        </div>
      </div>
    </div>
    <script src="js/options.bundle.js"></script>
  </body>
</html>
